name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint baseline + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Single source of truth: the same pin used locally and on Vercel.
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint baseline gate
        run: |
          # ESLint currently reports a known backlog of problems. Rather than
          # block on a clean tree (not yet achievable), this gate holds the line
          # at a fixed baseline and fails only if the total grows.
          #
          # BASELINE = 7 is the current count (errors + warnings, all files).
          # Lower it as the backlog is cleared; never raise it.
          #
          # We do NOT rely on eslint's exit code (it returns non-zero whenever
          # any error exists). Instead we emit JSON and sum the counts ourselves.
          npx eslint . -f json > eslint-report.json || true
          node -e '
            const fs = require("fs");
            const results = JSON.parse(fs.readFileSync("eslint-report.json", "utf8"));
            const errors = results.reduce((n, f) => n + f.errorCount, 0);
            const warnings = results.reduce((n, f) => n + f.warningCount, 0);
            const total = errors + warnings;
            const BASELINE = 7;
            console.log(`ESLint: ${total} problems (${errors} errors, ${warnings} warnings); baseline ${BASELINE}`);
            if (total > BASELINE) {
              console.error(`::error::ESLint problems (${total}) exceed the baseline (${BASELINE}). Fix new lint issues or do not raise the baseline.`);
              process.exit(1);
            }
          '

      - name: Build
        run: npm run build
